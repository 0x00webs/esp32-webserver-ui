<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>OTA Update</title>
		<link rel="stylesheet" href="style.css" />
		<script src="scripts.js" defer></script>
	</head>
	<body>
		<header class="site-header">
			<div class="branding">
				<img src="sensors_logo.png" alt="Sensors logo" class="logo" />
				<span class="device-id" id="device-id">--</span>
			</div>
			<nav class="main-nav">
				<button
					class="nav-toggle"
					aria-label="Toggle navigation"
					aria-expanded="false">
					<div></div>
				</button>
				<ul class="nav-list" id="navList">
					<li><a href="/" class="nav-link">Home</a></li>
					<li>
						<a href="device-details.html" class="nav-link"
							>Device Details</a
						>
					</li>
					<li><a href="ota.html" class="nav-link">OTA</a></li>
					<li>
						<a href="file-system.html" class="nav-link"
							>File Viewer</a
						>
					</li>
				</ul>
			</nav>
		</header>

		<main class="container">
			<section class="ota-page">
				<h1 class="page-title">OTA Update</h1>
				<section class="ota-section">
					<form id="ota_form" class="ota-form" enctype="multipart/form-data">
						<div class="form-group">
							<label for="firmware">Choose firmware (bin, max 2 MB)</label>
							<input type="file" id="firmware" name="firmware" accept=".bin" required />
						</div>
						<button type="submit" class="btn btn--primary">
							Upload
						</button>
					</form>
					<div id="progress_wrapper" class="progress-wrapper" hidden>
						<progress id="ota_progress" value="0" max="100"></progress>
						<div class="progress-text">
							<span>Uploaded </span><span id="progress_text">0%</span>
							</div>
							</div>
				</section>
			</section>
		</main>

		<footer class="site-footer">
			<small>&copy; 2026 sensors.AFRICA</small>
		</footer>

		<script>
			(function () {
				const form = document.getElementById('ota_form');
				const inputFile = document.getElementById('firmware');
				const progressWrapper =
					document.getElementById('progress_wrapper');
				const progressBar = document.getElementById('ota_progress');
				const progressText = document.getElementById('progress_text');
				const maxFileSize = 2 * 1024 * 1024;

				form.addEventListener('submit', function (e) {
					e.preventDefault();
					const file = inputFile.files[0];
					if (!file) {
						return;
					}
					const ext = file.name.split('.').pop();
					if (ext !== 'bin') {
						alert('File must be .bin');
						return;
					}
					if (file.size > maxFileSize) {
						alert('File too large');
						return;
					}
					if (!confirm('I am sure about this.')) return;

					const xhr = new XMLHttpRequest();
					xhr.timeout = 30000;
					const data = new FormData();
					data.append('firmware', file);
					xhr.upload.onloadstart = function () {
						progressWrapper.hidden = false;
					};
					xhr.upload.onprogress = function (e) {
						progressBar.max = e.total;
						progressBar.value = e.loaded;
						progressText.textContent =
							Math.ceil((e.loaded / e.total) * 100) + '%';
					};
					xhr.onload = function () {
						if (xhr.status === 200) {
							const ct = xhr.getResponseHeader('Content-Type');
							if (ct && ct.includes('text/html')) {
								document.body.innerHTML = xhr.responseText;
							} else {
								const p = document.createElement('p');
								p.textContent = xhr.responseText;
								document.body.appendChild(p);
								setTimeout(() => {
									document.body.innerHTML =
										'<p>File Saved Successfully!</p><p>Attempting firmware update...</p>';
								}, 2000);
							}
						}
					};
					xhr.ontimeout = function () {
						alert('Upload timeout');
					};
					xhr.open('POST', '/ota_upload');
					xhr.send(data);
				});
			})();
		</script>
	</body>
</html>
