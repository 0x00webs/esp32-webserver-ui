<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Device Details</title>
		<link rel="stylesheet" href="style.css" />
		<script src="scripts.js" defer></script>
	</head>
	<body>
		<header class="site-header">
			<div class="branding">
				<img src="sensors_logo.png" alt="Sensors logo" class="logo" />
				<span class="device-id" id="device-id">--</span>
			</div>
			<nav class="main-nav">
				<button
					class="nav-toggle"
					aria-label="Toggle navigation"
					aria-expanded="false">
					<div></div>
				</button>
				<ul class="nav-list" id="navList">
					<li><a href="/" class="nav-link">Home</a></li>
					<li>
						<a href="device-details.html" class="nav-link"
							>Device Details</a
						>
					</li>
					<li><a href="ota.html" class="nav-link">OTA</a></li>
					<li>
						<a href="file-system.html" class="nav-link"
							>File Viewer</a
						>
					</li>
				</ul>
			</nav>
		</header>

		<main class="container device-details-page">
			<h1 class="page-title">Device Details</h1>
			<section class="info-group" id="device_details"></section>
		</main>

		<footer class="site-footer">
			<small>&copy; 2026 sensors.Africa</small>
		</footer>

		<script>
			(function () {
				function renderSection(header, data) {
					let html = `<h2>${header}</h2><ul>`;
					for (const [k, v] of Object.entries(data)) {
						html += `<li><strong>${k}:</strong> ${v}</li>`;
					}
					html += '</ul>';
					return html;
				}

				fetch('/device-details')
					.then((r) => r.json())
					.then((data) => {
						let html = '';
						for (const [section, sectionData] of Object.entries(
							data,
						)) {
							if (
								sectionData &&
								Object.keys(sectionData).length === 0 &&
								sectionData.constructor === Object
							) {
								continue; // Skip if object is empty
							}
							const header = section.toUpperCase();
							html += renderSection(header, sectionData);
						}
						document.getElementById('device_details').innerHTML =
							html;
					})
					.catch((e) => {
						document.getElementById('device_details').textContent =
							'Failed to load device details';
						console.error(e);
					});
			})();
		</script>
	</body>
</html>
