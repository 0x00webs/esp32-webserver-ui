<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Home</title>
		<link rel="stylesheet" href="style.css" />
		<script src="scripts.js" defer></script>
	</head>
	<body>
		<header class="site-header">
			<div class="container">
				<div class="branding">
					<img
						src="sensors_logo.png"
						alt="Sensors logo"
						class="logo" />
					<span class="device-id" id="device-id">--</span>
				</div>
				<nav class="main-nav">
					<button
						class="btn nav-toggle"
						aria-label="Toggle navigation"
						aria-expanded="false">
						<div></div>
					</button>
					<div class="nav-backdrop"></div>
					<ul class="nav-list" id="navList">
						<li><a href="/" class="nav-link">Home</a></li>
						<li>
							<a href="device-details.html" class="nav-link"
								>Device Details</a
							>
						</li>
						<li><a href="ota.html" class="nav-link">OTA</a></li>
						<li>
							<a href="file-system.html" class="nav-link"
								>File Viewer</a
							>
						</li>
					</ul>
				</nav>
			</div>
			<!-- .container -->
		</header>

		<main class="container">
			<section class="sensor-overview-page">
				<h1 class="page-title">Sensor Data Overview</h1>
				<div class="sensor-overview__groups">
					<article class="sensor-group">
						<h2 class="sensor-group__title">Air Quality</h2>
						<div class="sensor-group__data">
							<div class="sensor-data__row">
								<span class="sensor-data__label">PM1</span>
								<span class="sensor-data__value" id="PM1_DATA">
									Unavailable
								</span>
							</div>
							<div class="sensor-data__row">
								<span class="sensor-data__label">PM2.5</span>
								<span class="sensor-data__value" id="PM25_DATA">
									Unavailable
								</span>
							</div>
							<div class="sensor-data__row">
								<span class="sensor-data__label">PM10</span>
								<span class="sensor-data__value" id="PM10_DATA">
									Unavailable
								</span>
							</div>
						</div>
					</article>
					<article class="sensor-group">
						<h2 class="sensor-group__title">Environment</h2>
						<div class="sensor-group__data">
							<div class="sensor-data__row">
								<span class="sensor-data__label"
									>Temperature:</span
								>
								<span
									class="sensor-data__value"
									id="temperature">
									Unavailable
								</span>
							</div>
							<div class="sensor-data__row">
								<span class="sensor-data__label"
									>Humidity:</span
								>
								<span class="sensor-data__value" id="humidity">
									Unavailable
								</span>
							</div>
						</div>
					</article>
				</div>
			</section>
		</main>

		<footer class="site-footer">
			<small>&copy; 2026 sensors.AFRICA</small>
		</footer>

		<script>
			(function () {
				const dataElTemplate =
					'<div><strong>$param:</strong> <span>$value $units</span></div>';
				const PM_data = document.getElementById('PM_DATA');

				const pm1_data = document.getElementById('PM1_DATA');
				const pm25_data = document.getElementById('PM25_DATA');
				const pm10_data = document.getElementById('PM10_DATA');
				const temperature = document.getElementById('temperature');
				const humidity = document.getElementById('humidity');

				function fetchData() {
					fetch('/sensor-data')
						.then((r) => r.json())
						.then((data) => {
							if (data) {
								if (data.PM) {
									pm1_data.textContent =
										data.PM['PM1'] + ' µg/m³';
									pm25_data.textContent =
										data.PM['PM2.5'] + ' µg/m³';
									pm10_data.textContent =
										data.PM['PM10'] + ' µg/m³';
								}
								if (data.DHT) {
									temperature.textContent =
										data.DHT.temperature + '°C';
									humidity.textContent =
										data.DHT.humidity + '%';
								}
							}
						})
						.catch(console.error);
				}
				fetchData();
				setInterval(fetchData, 5 * 60 * 1000);
			})();
		</script>
	</body>
</html>
